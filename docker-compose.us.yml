# US leg — model gateway + (later: crawlers, renderer, embeddings; M2+).
# Deploys via Coolify on the real server. The model gateway is NEVER public:
# it binds to GATEWAY_BIND (loopback locally, the WireGuard IP 10.66.0.2 on
# the server) so only the iran leg reaches it through the tunnel.
name: rpim-us

services:
  caddy:
    image: caddy:2-alpine
    profiles: ["local"]
    ports:
      - "127.0.0.1:${US_HTTP_PORT:-8002}:80"
    volumes:
      - ./infra/caddy/Caddyfile.us:/etc/caddy/Caddyfile:ro
    depends_on:
      model-gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  model-gateway:
    build:
      context: .
      dockerfile: apps/model-gateway/Dockerfile
    env_file:
      - path: ./.env.us
        required: false
    environment:
      REDIS_URL: redis://redis:6379/0 # service hostname, not a secret
      # Interpolated so Coolify-UI vars (or --env-file locally) reach the container:
      INTERNAL_TOKEN: ${INTERNAL_TOKEN:-}
      CORE_API_URL: ${CORE_API_URL:-http://10.66.0.1:8000}
      EMBEDDING_BACKEND: ${EMBEDDING_BACKEND:-fake}
      EMBEDDINGS_URL: http://embeddings:8090
    ports:
      # GATEWAY_PORT dodges host collisions (Traefik commonly owns 8080 on the server)
      - "${GATEWAY_BIND:-127.0.0.1}:${GATEWAY_PORT:-8080}:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request,sys;sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8080/health',timeout=3).status==200 else 1)",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  embeddings:
    build:
      context: .
      dockerfile: apps/embeddings/Dockerfile
      args:
        # Server (Coolify env): true → bakes bge-m3 deps. CI/local stay light.
        INSTALL_MODEL: ${EMBEDDINGS_INSTALL_MODEL:-false}
    env_file:
      - path: ./.env.us
        required: false
    environment:
      INTERNAL_TOKEN: ${INTERNAL_TOKEN:-}
      EMBEDDING_BACKEND: ${EMBEDDING_BACKEND:-fake}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-BAAI/bge-m3}
      EMBEDDING_DEVICE: ${EMBEDDING_DEVICE:-cpu}
    volumes:
      - model-cache:/root/.cache # bge-m3 downloads once, survives redeploys
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request,sys;sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8090/health',timeout=3).status==200 else 1)",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 120s # first real-model load is slow

  renderer:
    build:
      context: .
      dockerfile: apps/renderer/Dockerfile
    env_file:
      - path: ./.env.us
        required: false
    environment:
      INTERNAL_TOKEN: ${INTERNAL_TOKEN:-}
      # fake = deterministic PNG (safe default); live = chromium screenshot
      RENDER_MODE: ${RENDER_MODE:-fake}
    ports:
      # Never public: loopback locally, the WireGuard IP on the real server
      - "${RENDERER_BIND:-127.0.0.1}:${RENDERER_PORT:-8091}:8091"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request,sys;sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8091/health',timeout=3).status==200 else 1)",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  model-cache:
