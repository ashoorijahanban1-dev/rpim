name: eval-t2

# Runs the phase-0 Persian eval (scripts/eval/) from a GitHub runner so
# provider keys never enter a Claude session or the repo (rule 4) — they live
# in GitHub Actions Secrets: GEMINI_API_KEY / DEEPSEEK_API_KEY /
# ANTHROPIC_API_KEY (only those named in candidates/judge are required).
# Committed back for the session to read (no secrets in either):
#   docs/ops/eval-t2-report.txt      — ranked summary
#   docs/ops/eval-t2-results/*.jsonl — per-model outputs, so a human (or the
#     session) can judge when no LLM judge is configured
on:
  workflow_dispatch:
    inputs:
      candidates:
        description: "EVAL_CANDIDATES — provider:model, comma-separated"
        default: "gemini:gemini-2.0-flash,deepseek:deepseek-chat"
        type: string
      judge:
        description: "EVAL_JUDGE — provider:model; clear this field to skip auto-judging"
        default: "gemini:gemini-2.5-pro"
        type: string
      delay:
        description: "EVAL_DELAY_S — seconds between calls (free tiers need 4+)"
        default: "4"
        type: string

permissions:
  contents: write

concurrency: eval-t2

jobs:
  eval:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      EVAL_CANDIDATES: ${{ inputs.candidates }}
      EVAL_JUDGE: ${{ inputs.judge }}
      EVAL_DELAY_S: ${{ inputs.delay }}
      EVAL_RESULTS_DIR: eval-results
    steps:
      - uses: actions/checkout@v4

      - name: Guard — a key exists for every provider referenced
        run: |
          combo="$EVAL_CANDIDATES,$EVAL_JUDGE"
          missing=""
          for pair in gemini:GEMINI_API_KEY deepseek:DEEPSEEK_API_KEY anthropic:ANTHROPIC_API_KEY; do
            provider="${pair%%:*}"; var="${pair#*:}"
            if printf '%s' "$combo" | grep -q "${provider}:"; then
              eval "value=\${$var:-}"
              if [ -z "$value" ]; then missing="$missing $var"; fi
            fi
          done
          if [ -n "$missing" ]; then
            echo "::error::missing GitHub Actions secret(s):$missing — add them in Settings → Secrets → Actions (names only ever appear here)."
            exit 1
          fi

      - uses: astral-sh/setup-uv@v5
      - run: uv python install 3.12
      - run: uv sync --frozen

      - name: Run the 50-prompt Persian eval
        run: |
          uv run python scripts/eval/run_eval.py > ranked-summary.json

      - name: Commit report + per-model outputs
        # always(): a job timeout must still ship whatever was produced —
        # losing 2h of paced calls to a missing report happened once already.
        if: always()
        run: |
          mkdir -p docs/ops/eval-t2-results
          rm -f docs/ops/eval-t2-results/*.jsonl docs/ops/eval-t2-results/summary.json
          cp eval-results/*.jsonl eval-results/summary.json docs/ops/eval-t2-results/ 2>/dev/null || true
          [ -f ranked-summary.json ] || echo "[]" > ranked-summary.json
          {
            echo "# T2 eval report — $(date -u +%Y-%m-%dT%H:%M:%SZ) — commit $GITHUB_SHA — job status: ${{ job.status }}"
            echo "# candidates: $EVAL_CANDIDATES · judge: ${EVAL_JUDGE:-none} · delay: ${EVAL_DELAY_S}s"
            echo "# ranked by mean_score desc, then est_cost_usd asc (see scripts/eval/README.md)"
            cat ranked-summary.json
          } > docs/ops/eval-t2-report.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/ops/eval-t2-report.txt docs/ops/eval-t2-results
          git commit -m "chore(ops): T2 eval report + outputs [skip ci]" || echo "no changes to commit"
          git push
