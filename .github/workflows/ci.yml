name: ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv python install 3.12
      - run: uv sync --frozen
      - run: uv run ruff check .
      - run: uv run pytest

  dashboard:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/dashboard/package-lock.json
      - run: npm ci --no-audit --no-fund
      - run: npm run lint
      - run: npm run build

  compose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: make env-init
      - run: docker compose -f infra/docker-compose.iran.yml --profile local config -q
      - run: docker compose -f infra/docker-compose.us.yml --profile local config -q

  # The automated M0 acceptance: both legs actually up + two-way healthcheck.
  smoke:
    runs-on: ubuntu-latest
    needs: [python, dashboard, compose]
    env:
      CORE_BIND: 0.0.0.0 # containers must reach legs via host gateway in CI
      GATEWAY_BIND: 0.0.0.0
    steps:
      - uses: actions/checkout@v4
      - run: make env-init
      - run: make up-iran
      - run: make up-us
      - run: bash scripts/crossleg-healthcheck.sh local
      - run: bash scripts/crossleg-healthcheck.sh crossleg-ci
      - name: Logs on failure
        if: failure()
        run: |
          docker compose -f infra/docker-compose.iran.yml -p rpim-iran --profile local logs --tail 80
          docker compose -f infra/docker-compose.us.yml -p rpim-us --profile local logs --tail 80
      - name: Teardown
        if: always()
        run: make down-iran && make down-us

  # Stays skipped until Coolify secrets/vars exist (README § Production deploy).
  # Token lives ONLY in GitHub Secrets — never in this repo or any session.
  deploy:
    runs-on: ubuntu-latest
    needs: [smoke]
    if: github.ref == 'refs/heads/main' && vars.COOLIFY_IRAN_UUID != ''
    steps:
      - name: Redeploy iran leg via Coolify
        run: |
          curl -fsS "${{ vars.COOLIFY_URL }}/api/v1/deploy?uuid=${{ vars.COOLIFY_IRAN_UUID }}" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}"
      - name: Redeploy us leg via Coolify
        run: |
          curl -fsS "${{ vars.COOLIFY_URL }}/api/v1/deploy?uuid=${{ vars.COOLIFY_US_UUID }}" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}"
