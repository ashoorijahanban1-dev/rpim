name: ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv python install 3.12
      - run: uv sync --frozen
      - run: uv run ruff check .
      - run: uv run pytest

  dashboard:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/dashboard/package-lock.json
      - run: npm ci --no-audit --no-fund
      - run: npm run lint
      - run: npm run build

  compose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: make env-init
      - run: docker compose -f docker-compose.iran.yml --profile local config -q
      - run: docker compose -f docker-compose.us.yml --profile local config -q

  # The automated M0 acceptance: both legs actually up + two-way healthcheck.
  smoke:
    runs-on: ubuntu-latest
    needs: [python, dashboard, compose]
    env:
      CORE_BIND: 0.0.0.0 # containers must reach legs via host gateway in CI
      GATEWAY_BIND: 0.0.0.0
      # iran-leg core-api reaches the us-leg gateway across the host boundary,
      # standing in for the WireGuard tunnel (ADR 0004):
      GATEWAY_URL: http://host.docker.internal:8080
    steps:
      - uses: actions/checkout@v4
      - run: make env-init
      - run: make up-iran
      - run: make up-us
      - run: bash scripts/crossleg-healthcheck.sh local
      - run: bash scripts/crossleg-healthcheck.sh crossleg-ci
      # M2 acceptance end-to-end: register → upload → pgvector search <2s,
      # embeddings fetched through the real cross-leg gateway hop.
      - run: bash scripts/smoke-e2e.sh
      - name: Logs on failure
        if: failure()
        run: |
          docker compose -f docker-compose.iran.yml -p rpim-iran --profile local logs --tail 80
          docker compose -f docker-compose.us.yml -p rpim-us --profile local logs --tail 80
      - name: Teardown
        if: always()
        run: make down-iran && make down-us

  # Skips itself until the COOLIFY_TOKEN secret and infra/coolify-uuids.conf
  # (written by provisioning) exist. Token lives ONLY in GitHub Secrets —
  # never in this repo or any session.
  deploy:
    runs-on: ubuntu-latest
    needs: [smoke]
    if: github.ref == 'refs/heads/main'
    env:
      COOLIFY_URL: http://rpim.ir:8000
      COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Redeploy both legs via Coolify
        run: |
          if [ -z "$COOLIFY_TOKEN" ] || [ ! -f infra/coolify-uuids.conf ]; then
            echo "Coolify not wired yet (secret or uuid file missing) — skipping."
            exit 0
          fi
          . infra/coolify-uuids.conf
          curl -fsS "$COOLIFY_URL/api/v1/deploy?uuid=$COOLIFY_IRAN_UUID" \
            -H "Authorization: Bearer $COOLIFY_TOKEN"
          curl -fsS "$COOLIFY_URL/api/v1/deploy?uuid=$COOLIFY_US_UUID" \
            -H "Authorization: Bearer $COOLIFY_TOKEN"
