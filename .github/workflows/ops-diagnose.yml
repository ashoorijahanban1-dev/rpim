name: ops-diagnose

# READ-ONLY remote diagnosis: runs scripts/ops-diagnose.sh from a GitHub
# runner (the Claude sandbox cannot reach the Coolify panel; runners can) and
# commits the redacted report back so the session can read facts instead of
# guessing:
#   docs/ops/ops-diagnose-report.txt
# It never deploys and never writes to Coolify — corrective actions live in
# coolify-provision.yml.
on:
  workflow_dispatch:

permissions:
  contents: write

concurrency: ops-diagnose

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      COOLIFY_URL: ${{ vars.COOLIFY_URL || 'http://rpim.ir:8000' }}
      COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
    steps:
      - uses: actions/checkout@v7

      - name: Diagnose (never fails the step — report is the channel)
        run: |
          set +e
          if [ -z "$COOLIFY_TOKEN" ]; then
            echo "FATAL: COOLIFY_TOKEN secret is missing or empty" > report.txt
            rc=2
          else
            bash scripts/ops-diagnose.sh > report.txt 2>&1
            rc=$?
          fi
          # Belt & suspenders: literal token redaction, then verify; if the
          # token would still appear, the report is withheld entirely.
          python3 -c '
          import os
          tok = os.environ.get("COOLIFY_TOKEN") or ""
          s = open("report.txt", encoding="utf-8", errors="replace").read()
          if tok:
              s = s.replace(tok, "REDACTED")
          open("report.txt", "w", encoding="utf-8").write(s)
          '
          if [ -n "$COOLIFY_TOKEN" ] && grep -qF -- "$COOLIFY_TOKEN" report.txt; then
            echo "FATAL: token redaction failed — report withheld" > report.txt
            rc=3
          fi
          echo "exit_code=$rc" >> report.txt
          echo "rc=$rc" >> "$GITHUB_ENV"

      - name: Commit report back to the repo
        run: |
          mkdir -p docs/ops
          {
            echo "# ops-diagnose report — $(date -u +%FT%TZ) — commit $GITHUB_SHA"
            cat report.txt
          } > docs/ops/ops-diagnose-report.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/ops/ops-diagnose-report.txt
          git diff --cached --quiet || git commit -m "chore(ops): diagnose report [skip ci]"
          # rebase onto the DISPATCHED ref — this workflow also runs on branches.
          for attempt in 1 2 3; do
            git push && break
            git pull --rebase origin "$GITHUB_REF_NAME"
          done

      - name: Reflect real status
        run: exit "$rc"
