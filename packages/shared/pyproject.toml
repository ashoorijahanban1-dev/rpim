[project]
name = "rpim-shared"
version = "0.1.0"
description = "Shared Pydantic schemas for RPIM services"
requires-python = ">=3.12"
dependencies = ["pydantic>=2.7"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["rpim_shared"]
